<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tonder Web SDK — E2E fixture</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 24px;
        max-width: 640px;
      }
      .field {
        margin-bottom: 12px;
      }
      .field > div {
        min-height: 40px;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 4px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #555;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Tonder Web SDK — E2E fixture</h1>

    <!-- Skyflow COLLECT containers (kebab-case ids match SDK defaults). -->
    <section id="collect">
      <div class="field">
        <label for="collect-cardholder-name">Cardholder name</label>
        <div id="collect-cardholder-name"></div>
      </div>
      <div class="field">
        <label for="collect-card-number">Card number</label>
        <div id="collect-card-number"></div>
      </div>
      <div class="field">
        <label for="collect-expiration-month">Expiration month</label>
        <div id="collect-expiration-month"></div>
      </div>
      <div class="field">
        <label for="collect-expiration-year">Expiration year</label>
        <div id="collect-expiration-year"></div>
      </div>
      <div class="field">
        <label for="collect-cvv">CVV</label>
        <div id="collect-cvv"></div>
      </div>
    </section>

    <!-- Skyflow REVEAL containers. -->
    <section id="reveal">
      <div class="field">
        <label>Revealed card number</label>
        <div id="reveal-card-number"></div>
      </div>
      <div class="field">
        <label>Revealed cardholder name</label>
        <div id="reveal-cardholder-name"></div>
      </div>
      <div class="field">
        <div id="reveal-expiration-month"></div>
      </div>
      <div class="field">
        <div id="reveal-expiration-year"></div>
      </div>
    </section>

    <!-- The embedded 3DS/APM modal is SDK-owned (appended to document.body in a
         shadow root) — no merchant container is needed. -->

    <!-- IIFE global build exposes window.Tonder (createTonder, Tonder, ...). -->
    <script src="/dist/tonder-web-sdk.js"></script>
    <script>
      // Test bridge. Playwright sets callbacks/results here via page.evaluate
      // and page.exposeFunction. It is the single seam between the test process
      // and the SDK running in the page — no SDK calls run automatically.
      window.__tonderBridge = {
        // Holds the live Tonder instance created by a test.
        instance: null,
        // Last captured result/error for assertions across evaluate calls.
        lastResult: null,
        lastError: null,
      };
    </script>
  </body>
</html>
